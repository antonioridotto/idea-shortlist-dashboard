<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Antonio's Shortlist HQ</title>
  <link rel="stylesheet" href="styles.css?v=7" />
</head>
<body>
  <main class="wrap">
    <h1>Antonio's Shortlist HQ</h1>
    <p class="sub">Each app listed individually with date, App Store link, and revenue.</p>

    <div class="toolbar">
      <label for="viewFilter">View</label>
      <select id="viewFilter">
        <option value="all">All shortlist items</option>
        <option value="winners">Only winners</option>
      </select>
    </div>

    <section id="appList" class="list"></section>
  </main>

  <div id="prdModal" class="modal">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="prdTitle">PRD</h3>
        <button id="closePrdBtn" class="ghost">✕</button>
      </div>
      <textarea id="prdText" placeholder="PRD content..."></textarea>
      <div class="modal-actions">
        <button id="savePrdBtn">Save</button>
        <button id="copyPrdBtn" class="ghost">Copy</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=13"></script>
</body>
</html>
