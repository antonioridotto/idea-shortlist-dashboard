<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antonio Voice Bridge</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>🗣️ Antonio Voice Bridge</h1>
      <p class="subtitle">Speak to this exact OpenClaw session (no extra model/API key)</p>

      <section class="card">
        <div class="row">
          <button id="listenBtn">Start Listening</button>
          <button id="stopBtn" disabled>Stop</button>
          <label class="inline">
            <input id="autoSpeak" type="checkbox" checked />
            Read replies aloud
          </label>
        </div>

        <div class="row">
          <input id="manualInput" placeholder="Type instead of speaking..." />
          <button id="sendBtn">Send</button>
        </div>

        <div id="status">Idle</div>
      </section>

      <section class="card">
        <h2>Transcript</h2>
        <div id="transcript"></div>
      </section>

      <section class="card">
        <h2>Logs</h2>
        <pre id="logs"></pre>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
